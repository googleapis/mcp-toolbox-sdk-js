name: 'API Reference Backfill'
on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to backfill'
        type: choice
        options: [core, adk]
        required: true
      version:
        description: 'Version tag to build, e.g. v1.0.0'
        type: string
        required: true

# Key by package+version so different versions run in parallel; never cancel a
# queued run, so dispatching several at once can't silently drop any.
concurrency:
  group: api-docs-backfill-${{ inputs.package }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  backfill:
    # Never run on forks; docs deploy only from the upstream repository.
    if: github.repository == 'googleapis/mcp-toolbox-sdk-js'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Base on main for the current docs tooling + site chrome (version picker);
      # only the package API source comes from the tag, overlaid below.
      - name: Checkout main (current layout + scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          submodules: recursive

      - name: Checkout tagged package source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: refs/tags/${{ inputs.package }}-${{ inputs.version }}
          path: tagged_src
          # core uses only its own dir; adk also needs core (its dependency).
          sparse-checkout: |
            packages/toolbox-core
            packages/toolbox-adk

      # Swap main's src for the tag's so typedoc documents that version's API,
      # while keeping main's package.json/tsconfig/lockfile. adk documents core
      # too, so overlay both for an adk build.
      #
      # Best-effort: old src builds against main's current deps/tsconfig, so a
      # version predating a breaking change on main may fail. Recent tags are the
      # target; very old ones aren't guaranteed to build.
      - name: Overlay tagged source onto main
        env:
          PKG: ${{ inputs.package }}
        run: |
          case "$PKG" in
            core) DIRS=(packages/toolbox-core) ;;
            adk)  DIRS=(packages/toolbox-adk packages/toolbox-core) ;;
          esac
          for d in "${DIRS[@]}"; do
            rm -rf "$d/src"
            mv "tagged_src/$d/src" "$d/src"
          done

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.16.0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: '0.152.2'
          extended: true

      - name: Install PostCSS Dependencies
        run: |
          # Hugo's CSS pipeline needs postcss/autoprefixer in docs-site/node_modules.
          cd docs-site
          npm ci --no-workspaces

      # adk imports @toolbox-sdk/core, so build core first or typedoc fails with
      # TS2307 (missing build/esm/*.d.ts). Uses the tag's overlaid core src, so
      # adk resolves against the core it shipped with. Only core is built -- tsc
      # on adk's own old src could fail even when typedoc would still render it.
      - name: Build core dependency
        if: inputs.package == 'adk'
        run: |
          npm ci
          npx turbo run build --filter=@toolbox-sdk/core

      - name: Build docs
        env:
          PKG: ${{ inputs.package }}
          VER: ${{ inputs.version }}
          # Always the prod domain; deploys only run upstream (see job guard).
          BASE_URL: https://js.mcp-toolbox.dev/
        run: |
          chmod +x scripts/generate-api-docs.sh
          ./scripts/generate-api-docs.sh "$PKG" "$VER" "$BASE_URL"

      # PR into gh-pages (not a direct deploy) for human review. Overlay onto a
      # clone of the live tree so other versions, CNAME and .nojekyll survive and
      # the diff is just this version.
      - name: Open PR against gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG: ${{ inputs.package }}
          VER: ${{ inputs.version }}
        run: |
          set -euo pipefail
          BRANCH="backfill/${PKG}-${VER}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORK="$(mktemp -d)"
          git clone --depth 1 --branch gh-pages --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$WORK"
          cp -R "${GITHUB_WORKSPACE}/docs-site/public/." "$WORK/"

          cd "$WORK"
          git checkout -B "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No documentation changes for ${PKG} ${VER}; skipping PR."
            exit 0
          fi
          git commit -m "docs(api): backfill ${PKG} ${VER}"
          git push -f origin "$BRANCH"

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already open for ${BRANCH}; branch updated."
          else
            gh pr create --base gh-pages --head "$BRANCH" \
              --title "docs(api): backfill ${PKG} ${VER}" \
              --body "Automated API reference backfill for \`${PKG}/${VER}\`, built from main tooling with the tagged source overlaid. Merging publishes to gh-pages (additive)."
          fi
