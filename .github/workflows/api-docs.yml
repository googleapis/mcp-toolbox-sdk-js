name: "API Reference Deployment"
on:
  push:
    branches: [ 'main' ]
    tags: [ '**' ]
  workflow_dispatch:

concurrency:
  group: api-docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Never run on forks; docs deploy only from the upstream repository.
    if: github.repository == 'googleapis/mcp-toolbox-sdk-js'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.16.0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: '0.152.2'
          extended: true   
          
      - name: Install PostCSS Dependencies
        run: |
          # npm ci installs the exact versions from docs-site/package-lock.json
          # into docs-site/node_modules (where Hugo's PostCSS looks), so the
          # build is reproducible -- a broken upstream patch can't be pulled in.
          # --no-workspaces keeps the install out of the repo-root workspace
          # store; docs-site/package.json pins postcss/postcss-cli/autoprefixer.
          cd docs-site
          npm ci --no-workspaces

      - name: Resolve build target
        id: resolve
        run: |
          # Route the git ref to the package(s) and version to build.
          # A per-package tag builds that one package; pushes to main (and manual
          # dispatch) build both as "dev". JS release tags are hyphenated
          # (core-vX.Y.Z, adk-vX.Y.Z); release-please-* and any other tag are
          # skipped.
          REF="${GITHUB_REF}"
          case "$REF" in
            refs/tags/core-v*) echo "packages=core"     >> "$GITHUB_OUTPUT"; echo "version=${REF#refs/tags/core-}" >> "$GITHUB_OUTPUT" ;;
            refs/tags/adk-v*)  echo "packages=adk"      >> "$GITHUB_OUTPUT"; echo "version=${REF#refs/tags/adk-}"  >> "$GITHUB_OUTPUT" ;;
            refs/tags/*)       echo "packages="         >> "$GITHUB_OUTPUT"; echo "version="                       >> "$GITHUB_OUTPUT" ;;
            *)                 echo "packages=core adk" >> "$GITHUB_OUTPUT"; echo "version=dev"                     >> "$GITHUB_OUTPUT" ;;
          esac

          # Deploys only run upstream (see job-level guard), so always use the
          # production domain.
          echo "BASE_URL=https://js.mcp-toolbox.dev/" >> "$GITHUB_ENV"

      - name: Build workspace packages
        if: steps.resolve.outputs.packages != ''
        run: |
          # adk's docs import @toolbox-sdk/core, whose exported types resolve to
          # build/esm/*.d.ts. Build the workspace so those declarations exist
          # before TypeDoc runs, otherwise adk doc generation fails with TS2307.
          npm ci
          npm run build

      - name: Build per-package docs
        if: steps.resolve.outputs.packages != ''
        run: |
          chmod +x scripts/generate-api-docs.sh
          for PKG in ${{ steps.resolve.outputs.packages }}; do
            ./scripts/generate-api-docs.sh "$PKG" "${{ steps.resolve.outputs.version }}" "$BASE_URL"
          done

      - name: Build root page
        if: steps.resolve.outputs.packages != '' && startsWith(github.ref, 'refs/tags/')
        run: |
          chmod +x scripts/generate-root.sh
          ./scripts/generate-root.sh "$BASE_URL"

      - name: Deploy to gh-pages
        if: steps.resolve.outputs.packages != ''
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site/public
          keep_files: true 
          cname: ${{ github.repository == 'googleapis/mcp-toolbox-sdk-js' && 'js.mcp-toolbox.dev' || '' }}
